name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest test_noise_aware_qaoa.py -v --cov=noise_aware_qaoa --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black pylint

      - name: Check formatting with Black
        run: |
          black --check noise_aware_qaoa.py test_noise_aware_qaoa.py

      - name: Lint with Pylint
        run: |
          pylint noise_aware_qaoa.py --disable=C0103,R0913,R0914,R0915
        continue-on-error: true

  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run minimal QAOA benchmark
        run: |
          python noise_aware_qaoa.py \
            --n 6 \
            --p-list 1 2 \
            --graph-p 0.4 \
            --shots 256 \
            --seed 42 \
            --csv test_qaoa.csv \
            --json test_qaoa.json \
            --fig test_qaoa.png

      - name: Check outputs exist
        run: |
          test -f test_qaoa.csv
          test -f test_qaoa.json
          test -f test_qaoa.png
          echo "✅ All output files generated successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qaoa-benchmark-results
          path: |
            test_qaoa.csv
            test_qaoa.json
            test_qaoa.png
